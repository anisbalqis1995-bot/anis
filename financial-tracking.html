<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard VCMS - Buku Tunai & Tracking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Link Enjin Pengiraan -->
    <script src="https://unpkg.com/alpinejs" defer></script>
    <script src="app.js"></script>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <div class="flex h-screen" x-data="vcmsApp()">
        <!-- Sidebar -->
        <div class="bg-slate-800 text-white w-64 space-y-6 py-7 px-2 absolute inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition duration-200 ease-in-out shadow-lg">
            <div class="flex items-center space-x-2 px-4 justify-center">
                <i class="fa-solid fa-mosque text-2xl text-emerald-400"></i>
                <span class="text-2xl font-extrabold tracking-tight">VCMS System</span>
            </div>
            <nav class="space-y-2 px-2">
                <a href="index.html" class="block py-2.5 px-4 rounded hover:bg-slate-700"><i class="fa-solid fa-gauge-high mr-2"></i> Dashboard</a>
                <a href="financial-tracking.html" class="block py-2.5 px-4 rounded bg-emerald-600 text-white"><i class="fa-solid fa-book mr-2"></i> Buku Tunai</a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-y-auto">
            <header class="bg-white shadow-sm border-b border-gray-200 py-4 px-6">
                <h1 class="text-xl font-bold text-gray-800">Penjejakan Kewangan & Buku Tunai</h1>
            </header>

            <main class="p-6 max-w-7xl w-full mx-auto space-y-6">
                <!-- Grid Ringkasan Auto -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-5 rounded-xl shadow-sm border border-emerald-200">
                        <p class="text-xs font-semibold text-gray-400 uppercase">Jumlah Terimaan (Auto)</p>
                        <p class="text-2xl font-bold text-emerald-600" x-text="formatCurrency(totalTerimaan)"></p>
                    </div>
                    <div class="bg-white p-5 rounded-xl shadow-sm border border-red-200">
                        <p class="text-xs font-semibold text-gray-400 uppercase">Jumlah Pembayaran (Auto)</p>
                        <p class="text-2xl font-bold text-red-600" x-text="formatCurrency(totalPembayaran)"></p>
                    </div>
                </div>

                <!-- Form Input -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <h3 class="font-bold mb-4">Tambah Data (Sila Isi Nilai RM)</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-sm">Sumbangan Am</label>
                            <input type="number" x-model="input.sumbanganAm" class="w-full border p-2 rounded">
                        </div>
                        <div>
                            <label class="text-sm">Pentadbiran</label>
                            <input type="number" x-model="input.pentadbiran" class="w-full border p-2 rounded">
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
