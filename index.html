<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASHFLOW E-SURAU - Sistem Pengurusan Kewangan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-800" x-data="vcmsApp()" x-init="initApp()">

    <div class="flex h-screen overflow-hidden">
        <aside class="bg-slate-950 text-slate-200 w-64 space-y-4 py-6 px-4 flex flex-col justify-between shadow-xl z-20 no-print flex-shrink-0">
            <div class="space-y-4">
                <a href="first.html" class="flex items-center justify-center space-x-2 bg-slate-900 hover:bg-slate-800 text-emerald-400 hover:text-emerald-300 py-2.5 px-4 rounded-xl transition duration-150 text-xs font-bold border border-slate-800 shadow-inner">
                    <i class="fa-solid fa-arrow-left-long"></i> <span>Kembali ke Laman Utama</span>
                </a>
                <nav class="space-y-1">
                    <button @click="setTab('dashboard')" class="w-full flex items-center space-x-3 py-3 px-4 rounded-xl font-medium text-sm transition" :class="activeTab === 'dashboard' ? 'bg-emerald-600 text-white' : 'text-slate-400'">
                        <i class="fa-solid fa-gauge-high"></i> <span>Dashboard Utama</span>
                    </button>
                    <button @click="setTab('anggaran')" class="w-full flex items-center space-x-3 py-3 px-4 rounded-xl font-medium text-sm transition" :class="activeTab === 'anggaran' ? 'bg-emerald-600 text-white' : 'text-slate-400'">
                        <i class="fa-solid fa-chart-pie"></i> <span>Anggaran</span>
                    </button>
                    <button @click="setTab('bukutunai')" class="w-full flex items-center space-x-3 py-3 px-4 rounded-xl font-medium text-sm transition" :class="activeTab === 'bukutunai' ? 'bg-emerald-600 text-white' : 'text-slate-400'">
                        <i class="fa-solid fa-book-open"></i> <span>Buku Tunai & Log</span>
                    </button>
                </nav>
            </div>
        </aside>

        <div class="flex-1 flex flex-col overflow-hidden">
            <main class="flex-1 overflow-y-auto p-8" id="print-area">
                
                <div x-show="activeTab === 'dashboard'" x-cloak>
                    </div>

                <div x-show="activeTab === 'bukutunai'" x-cloak class="animate-fadeIn">
                    <h2 class="text-2xl font-bold mb-4">Buku Tunai & Log</h2>
                    <div class="bg-white p-4 rounded-xl shadow border overflow-x-auto">
                        <table class="w-full text-[9px] border-collapse border border-slate-300 text-center">
                            <thead>
                                <tr class="bg-slate-800 text-white"><th colspan="11" class="border p-2">TERIMAAN</th><th colspan="9" class="border p-2">PEMBAYARAN</th></tr>
                                <tr class="bg-slate-100">
                                    <th class="border p-1">TARIKH</th><th class="border p-1">BUTIRAN</th><th class="border p-1">NO RESIT</th><th class="border p-1">NO SLIP</th><th class="border p-1">SUMB. AM</th><th class="border p-1">SUMB. KHAS</th><th class="border p-1">SEWA</th><th class="border p-1">PELABURAN</th><th class="border p-1">DEPOSIT</th><th class="border p-1">HIBAH</th><th class="border p-1">JUMLAH</th>
                                    <th class="border p-1">TARIKH</th><th class="border p-1">BUTIRAN</th><th class="border p-1">BAUCAR</th><th class="border p-1">CEK</th><th class="border p-1">PENTADBIR</th><th class="border p-1">BGN</th><th class="border p-1">DAKWAH</th><th class="border p-1">SOSIAL</th><th class="border p-1">PELBAGAI</th>
                                </tr>
                            </thead>
                            <tbody><tr><td colspan="20" class="p-4 text-slate-400">Tiada data</td></tr></tbody>
                        </table>
                    </div>
                </div>

                <div x-show="activeTab === 'anggaran'" x-cloak>
                    <h2 class="text-2xl font-bold mb-4">Anggaran</h2>
                    </div>
            </main>
        </div>
    </div>

    <script>
        function vcmsApp() {
            return {
                activeTab: 'dashboard',
                setTab(tab) { this.activeTab = tab; },
                initApp() { /* Kod asal anda */ }
            }
        }
    </script>
</body>
</html>
