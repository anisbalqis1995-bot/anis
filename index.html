<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penjejak Kewangan Peribadi</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans min-h-screen">

    <div class="max-w-4xl mx-auto p-4 sm:p-6 lg:p-8">
        <header class="text-center my-6">
            <h1 class="text-3xl font-bold text-gray-800"><i class="fa-solid fa-wallet text-indigo-600 mr-2"></i>Penjejak Kewangan</h1>
            <p class="text-gray-500 text-sm mt-1">Urus aliran wang tunai anda dengan mudah</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                <div>
                    <p class="text-sm text-gray-500 font-medium">Baki Semasa</p>
                    <h3 id="total-balance" class="text-2xl font-bold text-gray-800 mt-1">RM 0.00</h3>
                </div>
                <div class="bg-indigo-50 p-3 rounded-full text-indigo-600 text-xl">
                    <i class="fa-solid fa-scale-balanced"></i>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                <div>
                    <p class="text-sm text-gray-500 font-medium">Jumlah Pendapatan</p>
                    <h3 id="total-income" class="text-2xl font-bold text-green-600 mt-1">RM 0.00</h3>
                </div>
                <div class="bg-green-50 p-3 rounded-full text-green-600 text-xl">
                    <i class="fa-solid fa-arrow-trend-up"></i>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                <div>
                    <p class="text-sm text-gray-500 font-medium">Jumlah Perbelanjaan</p>
                    <h3 id="total-expense" class="text-2xl font-bold text-red-600 mt-1">RM 0.00</h3>
                </div>
                <div class="bg-red-50 p-3 rounded-full text-red-600 text-xl">
                    <i class="fa-solid fa-arrow-trend-down"></i>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-5 gap-8">
            <div class="md:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-fit">
                <h3 class="text-lg font-semibold text-gray-800 mb-4">Tambah Transaksi</h3>
                <form id="transaction-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nama/Deskripsi</label>
                        <input type="text" id="text" placeholder="cth: Gaji, Makan Tengah Hari" required
                            class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition text-sm">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Amaun (RM)</label>
                        <input type="number" step="0.01" id="amount" placeholder="0.00" required
                            class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition text-sm">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Jenis</label>
                        <select id="type" class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition text-sm bg-white">
                            <option value="income">Pendapatan (+)</option>
                            <option value="expense">Perbelanjaan (-)</option>
                        </select>
                    </div>

                    <button type="submit" 
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-xl transition duration-200 shadow-sm cursor-pointer text-sm">
                        Simpan Transaksi
                    </button>
                </form>
            </div>

            <div class="md:col-span-3 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-lg font-semibold text-gray-800 mb-4">Sejarah Transaksi</h3>
                <ul id="transaction-list" class="space
