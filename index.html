<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Penjejak Kewangan Pintar</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen antialiased text-slate-800">

    <div class="max-w-6xl mx-auto p-4 sm:p-6 lg:p-8">
        
        <header class="flex flex-col sm:flex-row justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-8 gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 text-white p-3 rounded-xl shadow-md shadow-indigo-100">
                    <i class="fa-solid fa-chart-pie text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">FinTrack Pro</h1>
                    <p class="text-xs text-slate-400">Pengurusan Aliran Tunai Pintar</p>
                </div>
            </div>
            <div id="live-date" class="text-xs font-medium bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg">
                </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">
            <div class="bg-gradient-to-br from-indigo-600 to-indigo-700 p-6 rounded-2xl shadow-lg text-white relative overflow-hidden">
                <div class="absolute -right-6 -bottom-6 text-white/10 text-9xl font-bold"><i class="fa-solid fa-vault"></i></div>
                <p class="text-sm text-indigo-100 font-medium">Baki Keseluruhan</p>
                <h3 id="total-balance" class="text-3xl font-extrabold mt-2 tracking-tight">RM 0.00</h3>
                <div class="mt-4 flex items-center text-xs text-indigo-100 gap-1 bg-white/10 w-fit px-2 py-1 rounded-md">
                    <i class="fa-solid fa-shield-halved"></i> Data disimpan dengan selamat
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between">
                <div>
                    <p class="text-sm text-slate-400 font-medium">Jumlah Pendapatan</p>
                    <h3 id="total-income" class="text-2xl font-bold text-emerald-600 mt-1">RM 0.00</h3>
                </div>
                <div class="bg-emerald-50 p-4 rounded-xl text-emerald-600 text-xl">
                    <i class="fa-solid fa-arrow-up-long"></i>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between">
                <div>
                    <p class="text-sm text-slate-400 font-medium">Jumlah Perbelanjaan</p>
                    <h3 id="total-expense" class="text-2xl font-bold text-rose-600 mt-1">RM 0.00</h3>
                </div>
                <div class="bg-rose-50 p-4 rounded-xl text-rose-600 text-xl">
                    <i class="fa-solid fa-arrow-down-long"></i>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-5 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="text-base font-bold text-slate-800 mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-plus text-indigo-500 text-sm"></i> Rekod Transaksi Baru
                    </h3>
                    <form id="transaction-form" class="space-y-4">
                        <div class="grid grid-cols-2 gap-3">
                            <button type="button" id="btn-type-income" onclick="setType('income')" class="py-2.5 rounded-xl border-2 border-emerald-500 bg-emerald-50 text-emerald-700 font-semibold text-sm transition cursor-pointer flex justify-center items-center gap-2">
                                <i class="fa-solid
